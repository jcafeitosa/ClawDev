services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: clawdev
      POSTGRES_PASSWORD: clawdev
      POSTGRES_DB: clawdev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawdev -d clawdev"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://clawdev:clawdev@db:5432/clawdev
      PORT: "3100"
      SERVE_UI: "true"
      CLAWDEV_DEPLOYMENT_MODE: "authenticated"
      CLAWDEV_DEPLOYMENT_EXPOSURE: "private"
      CLAWDEV_PUBLIC_URL: "${CLAWDEV_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - clawdev-data:/clawdev
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  clawdev-data:
