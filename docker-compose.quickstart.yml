services:
  clawdev:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${CLAWDEV_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      CLAWDEV_HOME: "/clawdev"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      CLAWDEV_DEPLOYMENT_MODE: "authenticated"
      CLAWDEV_DEPLOYMENT_EXPOSURE: "private"
      CLAWDEV_PUBLIC_URL: "${CLAWDEV_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${CLAWDEV_DATA_DIR:-./data/docker-clawdev}:/clawdev"
